<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vrukshaayurveda | Ontology Portal</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
</head>
<body>
  <div class="bg-blur blur-1"></div>
  <div class="bg-blur blur-2"></div>

  <div class="container">
    <div class="header">
      <span class="badge">Semantic Web AI</span>
      <h1>🌿 Vrukshaayurveda</h1>
      <p class="subtitle">Ancient Plant Wisdom via Ontology</p>
    </div>

    <div class="search-card">
      <div class="input-wrapper">
        <input type="text" id="plant-input" placeholder="Search a plant (e.g. Mango)...">
      </div>
      <button onclick="searchPlant()" id="search-btn">
        <span>Search</span>
      </button>
    </div>

    <div id="output" class="output-box">
      <p class="placeholder-text">Enter a plant name to query the OWL ontology.</p>
    </div>
    
    <div class="footer">
      Created by Kiran • Vidya Academy
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
